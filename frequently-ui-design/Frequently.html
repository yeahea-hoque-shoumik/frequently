<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Frequently — Binaural Beat Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { background: #05060d; }
  body {
    display: flex; align-items: flex-start; justify-content: center;
    padding: 24px; min-height: 100vh;
  }
  #canvas {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 28px 32px;
    justify-content: center;
  }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cell-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: #6c6a92;
  }
  .cell-label em { color: #a594ff; font-style: normal; }
  .section-label {
    grid-column: 1 / -1;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 500; color: #f3f1ff;
    padding: 18px 4px 0;
    display: flex; align-items: baseline; gap: 12px;
  }
  .section-label span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #6c6a92; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .title-block {
    grid-column: 1 / -1;
    padding: 20px 8px 20px;
    max-width: 1400px;
  }
  .title-block h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 56px; font-weight: 400; letter-spacing: -0.03em;
    margin: 0; color: #f3f1ff; line-height: 1;
  }
  .title-block h1 em {
    font-style: italic;
    background: linear-gradient(135deg, #a594ff, #5ef0e3);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .title-block .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #6c6a92; margin-bottom: 12px;
  }
  .title-block p {
    font-family: 'Inter', sans-serif;
    font-size: 15px; color: #a5a3c9; line-height: 1.6; margin: 20px 0 0;
    max-width: 640px;
  }
  .title-block .tags {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 24px;
  }
  .title-block .tags span {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    color: #a5a3c9; letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<div id="canvas"></div>

<script type="text/babel" src="frames/android-frame.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/visualizer.jsx"></script>
<script type="text/babel" src="src/screen-player.jsx"></script>
<script type="text/babel" src="src/screen-builder.jsx"></script>
<script type="text/babel" src="src/screens-static.jsx"></script>

<script type="text/babel" data-presets="env,react">
const PhoneFrame = ({ children, dark = true }) => (
  <div style={{
    width: 360, height: 760, borderRadius: 44,
    background: '#000',
    border: '1px solid rgba(255,255,255,0.1)',
    padding: 10,
    boxShadow: '0 30px 80px rgba(0,0,0,0.6), inset 0 0 0 2px rgba(255,255,255,0.04)',
    position: 'relative',
  }}>
    {/* Status bar */}
    <div style={{
      position: 'absolute', top: 18, left: 24, right: 24,
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      zIndex: 10,
      fontFamily: 'JetBrains Mono, monospace', fontSize: 12, color: '#f3f1ff',
      pointerEvents: 'none',
    }}>
      <span>9:41</span>
      <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
        <svg width="14" height="10" viewBox="0 0 14 10" fill="#f3f1ff"><rect x="0" y="6" width="2.5" height="4" rx="0.5"/><rect x="3.5" y="4" width="2.5" height="6" rx="0.5"/><rect x="7" y="2" width="2.5" height="8" rx="0.5"/><rect x="10.5" y="0" width="2.5" height="10" rx="0.5"/></svg>
        <svg width="16" height="10" viewBox="0 0 16 10" fill="none" stroke="#f3f1ff" strokeWidth="1"><rect x="0.5" y="1.5" width="12" height="7" rx="1.5"/><rect x="2" y="3" width="9" height="4" rx="0.5" fill="#f3f1ff"/><path d="M14 4v2" strokeLinecap="round"/></svg>
      </div>
    </div>
    {/* Camera hole */}
    <div style={{
      position: 'absolute', top: 14, left: '50%', transform: 'translateX(-50%)',
      width: 10, height: 10, borderRadius: '50%', background: '#000',
      zIndex: 10,
    }}/>
    <div style={{
      width: '100%', height: '100%', borderRadius: 34,
      overflow: 'hidden', position: 'relative',
      background: '#05060d',
    }}>
      {children}
    </div>
  </div>
);

const Cell = ({ label, num, children }) => (
  <div className="cell">
    <PhoneFrame>{children}</PhoneFrame>
    <div className="cell-label"><em>{num}</em> &nbsp; {label}</div>
  </div>
);

const noop = () => {};
const defaultPreset = PRESETS[2]; // Calm Focus — alpha

function App() {
  return (
    <>
      <div className="title-block">
        <div className="eyebrow">Frequently · Android · Native (Kotlin) · Hi-fi prototype</div>
        <h1>Tune your <em>brain</em><br/>to any frequency.</h1>
        <p>
          A binaural beat generator built for daily ritual. Ten screens: onboarding, a browse library with presets,
          a live music-player with band/base/beat/timer controls, a full custom Hz keypad, a circular timer dial,
          a session history with 7-day graph, a stackable background-noise mixer, a drag-to-sequence track builder
          with per-segment editing, an on-device saved-tracks library, and settings. Two screens — the <strong style={{ color: '#f3f1ff' }}>Player</strong> and
          the <strong style={{ color: '#f3f1ff' }}>Track Builder</strong> — are fully interactive. Try them.
        </p>
        <div className="tags">
          <span>WCAG AA contrast</span>
          <span>Material 3 structure</span>
          <span>5 wave bands</span>
          <span>8 preset tracks</span>
          <span>8 ambient layers</span>
          <span>Space Grotesk · Inter · JetBrains Mono</span>
        </div>
      </div>

      <div className="section-label">Core flows <span>player · track builder — both live</span></div>

      <Cell num="01" label="Player — now playing (live)">
        <PlayerScreen preset={defaultPreset} onBack={noop} onOpenMixer={noop} onOpenTimer={noop}/>
      </Cell>
      <Cell num="02" label="Track Builder — stack & sequence (live)">
        <BuilderScreen onBack={noop} onPlay={noop}/>
      </Cell>
      <Cell num="03" label="Custom Hz — dial any frequency">
        <CustomHzScreen onBack={noop}/>
      </Cell>

      <div className="section-label">Browse & library <span>discovery, saved tracks, history</span></div>

      <Cell num="04" label="Onboarding — first launch">
        <OnboardingScreen onDone={noop}/>
      </Cell>
      <Cell num="05" label="Library — preset browse">
        <LibraryScreen onPick={noop} onCustom={noop}/>
      </Cell>
      <Cell num="06" label="Saved tracks — on-device">
        <SavedScreen onBack={noop} onNew={noop}/>
      </Cell>

      <div className="section-label">Session tools <span>timer, mixer, history, settings</span></div>

      <Cell num="07" label="Timer — circular dial">
        <TimerScreen onBack={noop}/>
      </Cell>
      <Cell num="08" label="Mixer — stack ambient layers">
        <MixerScreen onBack={noop}/>
      </Cell>
      <Cell num="09" label="History — weekly streaks">
        <HistoryScreen onBack={noop}/>
      </Cell>
      <Cell num="10" label="Settings — audio & session">
        <SettingsScreen onBack={noop}/>
      </Cell>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('canvas'));
root.render(<App/>);
</script>
</body>
</html>
